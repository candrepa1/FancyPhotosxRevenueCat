<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc3545"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#999"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="450" fill="#fafafa" rx="10"/>

  <!-- ===== TOP ROW: FRAUD THREATS ===== -->
  <text x="450" y="32" text-anchor="middle" font-size="11" font-weight="700" fill="#dc3545" letter-spacing="1.5">FRAUD THREATS</text>

  <!-- Attack 1: Fake receipts -->
  <rect x="30" y="48" width="190" height="52" rx="8" fill="#fff0f0" stroke="#dc3545" stroke-width="1"/>
  <text x="125" y="70" text-anchor="middle" font-size="11" font-weight="600" fill="#dc3545">Fake / Forged Receipts</text>
  <text x="125" y="86" text-anchor="middle" font-size="9" fill="#999">Spoofed purchase tokens</text>

  <!-- Attack 2: MiTM -->
  <rect x="240" y="48" width="190" height="52" rx="8" fill="#fff0f0" stroke="#dc3545" stroke-width="1"/>
  <text x="335" y="70" text-anchor="middle" font-size="11" font-weight="600" fill="#dc3545">Man-in-the-Middle</text>
  <text x="335" y="86" text-anchor="middle" font-size="9" fill="#999">Tampered API responses</text>

  <!-- Attack 3: Direct API abuse -->
  <rect x="470" y="48" width="190" height="52" rx="8" fill="#fff0f0" stroke="#dc3545" stroke-width="1"/>
  <text x="565" y="70" text-anchor="middle" font-size="11" font-weight="600" fill="#dc3545">Direct API Abuse</text>
  <text x="565" y="86" text-anchor="middle" font-size="9" fill="#999">Bypassing client checks</text>

  <!-- Attack 4: Refund abuse -->
  <rect x="680" y="48" width="190" height="52" rx="8" fill="#fff0f0" stroke="#dc3545" stroke-width="1"/>
  <text x="775" y="70" text-anchor="middle" font-size="11" font-weight="600" fill="#dc3545">Refund Risk</text>
  <text x="775" y="86" text-anchor="middle" font-size="9" fill="#999">Revenue loss after usage</text>

  <!-- Red arrows from attacks down -->
  <line x1="125" y1="100" x2="125" y2="145" stroke="#dc3545" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-red)"/>
  <line x1="335" y1="100" x2="335" y2="145" stroke="#dc3545" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-red)"/>
  <line x1="565" y1="100" x2="565" y2="145" stroke="#dc3545" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-red)"/>
  <line x1="775" y1="100" x2="775" y2="145" stroke="#dc3545" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-red)"/>

  <!-- ===== MIDDLE ROW: REVENUECAT SHIELD ===== -->
  <rect x="30" y="150" width="840" height="105" rx="10" fill="#eef4ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="450" y="174" text-anchor="middle" font-size="11" font-weight="700" fill="#2563eb" letter-spacing="1.5">REVENUECAT PROTECTION LAYER</text>

  <!-- Protection 1: Receipt Validation -->
  <rect x="52" y="190" width="175" height="50" rx="8" fill="#2563eb"/>
  <text x="139" y="212" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Receipt Validation</text>
  <text x="139" y="230" text-anchor="middle" font-size="8" font-weight="600" fill="#93b4ff">BUILT-IN</text>

  <!-- Protection 2: Trusted Entitlements -->
  <rect x="248" y="190" width="175" height="50" rx="8" fill="#2563eb"/>
  <text x="335" y="212" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Trusted Entitlements</text>
  <text x="335" y="230" text-anchor="middle" font-size="8" font-weight="600" fill="#93b4ff">SDK CONFIG</text>

  <!-- Protection 3: Server-Side Gating -->
  <rect x="448" y="190" width="175" height="50" rx="8" fill="#2563eb"/>
  <text x="535" y="212" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Server-Side Gating</text>
  <text x="535" y="230" text-anchor="middle" font-size="8" font-weight="600" fill="#93b4ff">API INTEGRATION</text>

  <!-- Protection 4: Refund Handling -->
  <rect x="648" y="190" width="200" height="50" rx="8" fill="#2563eb"/>
  <text x="748" y="212" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Refund Handling</text>
  <text x="748" y="230" text-anchor="middle" font-size="8" font-weight="600" fill="#93b4ff">DASHBOARD + API</text>

  <!-- Blocked indicators (X marks on the attack arrows) -->
  <g transform="translate(125, 136)">
    <circle r="8" fill="#fff" stroke="#22a855" stroke-width="1.5"/>
    <text y="4" text-anchor="middle" font-size="11" font-weight="700" fill="#22a855">&#x2715;</text>
  </g>
  <g transform="translate(335, 136)">
    <circle r="8" fill="#fff" stroke="#22a855" stroke-width="1.5"/>
    <text y="4" text-anchor="middle" font-size="11" font-weight="700" fill="#22a855">&#x2715;</text>
  </g>
  <g transform="translate(565, 136)">
    <circle r="8" fill="#fff" stroke="#22a855" stroke-width="1.5"/>
    <text y="4" text-anchor="middle" font-size="11" font-weight="700" fill="#22a855">&#x2715;</text>
  </g>
  <g transform="translate(775, 136)">
    <circle r="8" fill="#fff" stroke="#22a855" stroke-width="1.5"/>
    <text y="4" text-anchor="middle" font-size="11" font-weight="700" fill="#22a855">&#x2715;</text>
  </g>

  <!-- ===== BOTTOM ROW: FANCYPHOTOS ===== -->
  <!-- Gray arrows from RC to FancyPhotos -->
  <line x1="230" y1="255" x2="230" y2="300" stroke="#999" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <line x1="450" y1="255" x2="450" y2="300" stroke="#999" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <line x1="670" y1="255" x2="670" y2="300" stroke="#999" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <text x="340" y="280" text-anchor="middle" font-size="9" font-style="italic" fill="#999">protects</text>

  <rect x="80" y="305" width="740" height="125" rx="10" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="450" y="329" text-anchor="middle" font-size="11" font-weight="700" fill="#666" letter-spacing="1.5">FANCYPHOTOS</text>

  <!-- App -->
  <rect x="120" y="345" width="200" height="65" rx="8" fill="#1a1a1a"/>
  <text x="220" y="371" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">iOS / Android App</text>
  <text x="220" y="389" text-anchor="middle" font-size="9" fill="#888">Purchases + entitlement checks</text>
  <text x="220" y="401" text-anchor="middle" font-size="9" fill="#888">via RevenueCat SDK</text>

  <!-- Backend -->
  <rect x="380" y="345" width="200" height="65" rx="8" fill="#1a1a1a"/>
  <text x="480" y="371" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Backend Server</text>
  <text x="480" y="389" text-anchor="middle" font-size="9" fill="#888">AI compute + feature gating</text>
  <text x="480" y="401" text-anchor="middle" font-size="9" fill="#888">via RevenueCat API</text>

  <!-- Revenue -->
  <rect x="640" y="345" width="140" height="65" rx="8" fill="#1a1a1a"/>
  <text x="710" y="371" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Revenue</text>
  <text x="710" y="389" text-anchor="middle" font-size="9" fill="#888">Refund impact</text>
  <text x="710" y="401" text-anchor="middle" font-size="9" fill="#888">minimized</text>
</svg>